{% extends "base.html" %}

{% block title %}Login - POS System{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
        <!-- Logo & Company Name -->
        <div class="text-center mb-6">
            <img src="{{ url_for('static', filename='img/easypay-logo.png') }}" 
                 alt="EASY PAY Logo" 
                 class="w-20 h-20 mx-auto mb-3 object-contain">
            <h1 class="text-3xl font-bold text-slate-800">EASY PAY</h1>
            <p class="text-sm text-slate-500 mt-1">Sign in to your POS system</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
            <form method="POST" class="space-y-4">
                <!-- Username Field -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                        Username
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <input type="text" name="username" class="w-full border-2 border-slate-200 rounded-xl pl-10 pr-3 py-2.5 text-sm focus:border-indigo-400 focus:outline-none transition" 
                               placeholder="Enter your username" required autofocus>
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                        Password
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                        <input type="password" name="password" id="password-field" class="w-full border-2 border-slate-200 rounded-xl pl-10 pr-10 py-2.5 text-sm focus:border-indigo-400 focus:outline-none transition" 
                               placeholder="Enter your password" required>
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <svg id="toggle-icon" class="w-4 h-4 text-slate-400 hover:text-slate-600 transition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Login Button -->
                <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-medium hover:bg-indigo-700 transition flex items-center justify-center gap-2 shadow-sm mt-2">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-5">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center">
                    <span class="px-3 bg-white text-xs text-slate-400 font-medium uppercase tracking-wider">Demo Credentials</span>
                </div>
            </div>

            <!-- Demo Credentials -->
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-50 rounded-xl p-3 text-center border border-slate-100">
                    <div class="flex items-center justify-center gap-1.5 mb-1.5">
                        <div class="w-6 h-6 bg-indigo-100 rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <span class="text-xs font-medium text-slate-600">Owner</span>
                    </div>
                    <div class="text-xs text-slate-400">
                        <code class="text-indigo-600 font-medium">owner</code>
                        <span class="mx-1">•</span>
                        <code class="text-slate-500">owner123</code>
                    </div>
                </div>
                <div class="bg-slate-50 rounded-xl p-3 text-center border border-slate-100">
                    <div class="flex items-center justify-center gap-1.5 mb-1.5">
                        <div class="w-6 h-6 bg-amber-100 rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-amber-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <span class="text-xs font-medium text-slate-600">Staff</span>
                    </div>
                    <div class="text-xs text-slate-400">
                        <code class="text-indigo-600 font-medium">staff</code>
                        <span class="mx-1">•</span>
                        <code class="text-slate-500">staff123</code>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Text -->
        <p class="text-center text-xs text-slate-400 mt-4">
            <svg class="w-3 h-3 inline-block mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Secure login • Encrypted connection
        </p>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById('password-field');
        const toggleIcon = document.getElementById('toggle-icon');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            toggleIcon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            `;
        } else {
            passwordField.type = 'password';
            toggleIcon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            `;
        }
    }
</script>
{% endblock %}
