{% extends "base.html" %}

{% block title %}Bill History{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 30%, #fdf2f8 70%, #fef3c7 100%);
        min-height: 100vh;
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    }
    .stat-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        transition: all 0.3s ease;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
    .gradient-indigo { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .gradient-emerald { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .gradient-amber { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
    .gradient-rose { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    .tab-active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; color: white !important; border-color: transparent !important; }
    .modal-backdrop { backdrop-filter: blur(4px); background: rgba(0,0,0,0.4); }

    .copy-toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: white;
        padding: 8px 20px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        z-index: 9999;
        animation: fadeInOut 1.5s ease forwards;
    }
    @keyframes fadeInOut {
        0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
        15% { opacity: 1; transform: translateX(-50%) translateY(0); }
        75% { opacity: 1; transform: translateX(-50%) translateY(0); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-2 sm:px-4 py-3 sm:py-4">
    
    <!-- Header -->
    <div class="mb-4 sm:mb-6">
        <h1 class="text-lg sm:text-2xl font-bold text-slate-800 flex items-center gap-2 sm:gap-3">
            <span class="w-8 h-8 sm:w-10 sm:h-10 gradient-indigo rounded-lg sm:rounded-xl flex items-center justify-center shadow-lg flex-shrink-0">
                <svg class="w-4 h-4 sm:w-6 sm:h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
            </span>
            Bill History
        </h1>
    </div>

    <!-- Filters -->
    <div class="glass-card rounded-xl sm:rounded-2xl p-3 sm:p-4 mb-3 sm:mb-4">
        <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-3">
            <div>
                <label class="block text-[10px] sm:text-xs font-semibold text-slate-500 uppercase mb-1">Search</label>
                <input type="text" id="searchQuery" class="w-full border-2 border-slate-200 rounded-lg sm:rounded-xl px-2 sm:px-3 py-1.5 sm:py-2.5 text-xs sm:text-sm bg-white/80 focus:border-indigo-400 focus:outline-none" placeholder="Invoice, name, phone or item..." onkeyup="loadBills()">
            </div>
            <!-- All date button -->
            <div class="hidden sm:block">
                <label class="block text-[10px] sm:text-xs font-semibold text-slate-500 uppercase mb-1">Date</label>
                <div class="flex gap-1">
                    <input type="date" id="filterDate" class="flex-1 border-2 border-slate-200 rounded-lg sm:rounded-xl px-2 sm:px-3 py-1.5 sm:py-2.5 text-xs sm:text-sm bg-white/80 focus:border-indigo-400 focus:outline-none" onchange="loadBills()">
                    <button onclick="document.getElementById('filterDate').value='';loadBills()" class="bg-slate-200 px-3 py-1.5 sm:py-2.5 rounded-lg sm:rounded-xl text-xs sm:text-sm font-medium hover:bg-slate-300">All</button>
                </div>
            </div>
            <div>
                <label class="block text-[10px] sm:text-xs font-semibold text-slate-500 uppercase mb-1">Type</label>
                <select id="filterPayment" class="w-full border-2 border-slate-200 rounded-lg sm:rounded-xl px-2 sm:px-3 py-1.5 sm:py-2.5 text-xs sm:text-sm bg-white/80 focus:border-indigo-400 focus:outline-none" onchange="loadBills()">
                    <option value="all">All Types</option>
                    <option value="cash">Cash</option>
                    <option value="card">Card</option>
                    <option value="check">Cheque</option>
                    <option value="credit">Credit</option>
                </select>
            </div>
            <div class="flex items-end">
                <button onclick="loadBills()" class="w-full gradient-indigo text-white px-3 sm:px-4 py-1.5 sm:py-2.5 rounded-lg sm:rounded-xl text-xs sm:text-sm font-medium hover:opacity-90 shadow-lg flex items-center justify-center gap-1.5">
                    <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Search
                </button>
            </div>
        </div>
        <!-- Mobile Date -->
        <div class="sm:hidden mt-2">
            <label class="block text-[10px] font-semibold text-slate-500 uppercase mb-1">Date</label>
            <div class="flex gap-1">
                <input type="date" id="filterDateMobile" class="flex-1 border-2 border-slate-200 rounded-lg px-2 py-1.5 text-xs bg-white/80" onchange="syncDate()">
                <button onclick="document.getElementById('filterDateMobile').value='';document.getElementById('filterDate').value='';loadBills()" class="bg-slate-200 px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-slate-300">All</button>
            </div>
        </div>
    </div>
    
    <!-- Stats Cards -->
    <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-3 mb-3 sm:mb-4">
        <div class="stat-card rounded-xl sm:rounded-2xl p-3 sm:p-4">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="w-8 h-8 sm:w-12 sm:h-12 gradient-indigo rounded-lg sm:rounded-xl flex items-center justify-center shadow-lg flex-shrink-0">
                    <svg class="w-4 h-4 sm:w-6 sm:h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg>
                </div>
                <div class="min-w-0">
                    <p class="text-lg sm:text-xl font-bold text-slate-800 truncate" id="totalBills">0</p>
                    <p class="text-[10px] sm:text-xs text-slate-400 uppercase tracking-wider font-medium">Total Bills</p>
                </div>
            </div>
        </div>
        <div class="stat-card rounded-xl sm:rounded-2xl p-3 sm:p-4">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="w-8 h-8 sm:w-12 sm:h-12 gradient-emerald rounded-lg sm:rounded-xl flex items-center justify-center shadow-lg flex-shrink-0">
                    <svg class="w-4 h-4 sm:w-6 sm:h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
                <div class="min-w-0">
                    <p class="text-lg sm:text-xl font-bold text-slate-800 truncate" id="totalSales">Rs.0</p>
                    <p class="text-[10px] sm:text-xs text-slate-400 uppercase tracking-wider font-medium">Total Sales</p>
                </div>
            </div>
        </div>
        <div class="stat-card rounded-xl sm:rounded-2xl p-3 sm:p-4">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="w-8 h-8 sm:w-12 sm:h-12 gradient-amber rounded-lg sm:rounded-xl flex items-center justify-center shadow-lg flex-shrink-0">
                    <svg class="w-4 h-4 sm:w-6 sm:h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
                <div class="min-w-0">
                    <p class="text-lg sm:text-xl font-bold text-slate-800 truncate" id="pendingPayments">0</p>
                    <p class="text-[10px] sm:text-xs text-slate-400 uppercase tracking-wider font-medium">Pending</p>
                </div>
            </div>
        </div>
        <div class="stat-card rounded-xl sm:rounded-2xl p-3 sm:p-4">
            <div class="flex items-center gap-2 sm:gap-3">
                <div class="w-8 h-8 sm:w-12 sm:h-12 gradient-rose rounded-lg sm:rounded-xl flex items-center justify-center shadow-lg flex-shrink-0">
                    <svg class="w-4 h-4 sm:w-6 sm:h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                </div>
                <div class="min-w-0">
                    <p class="text-lg sm:text-xl font-bold text-slate-800 truncate" id="pendingAmount">Rs.0</p>
                    <p class="text-[10px] sm:text-xs text-slate-400 uppercase tracking-wider font-medium">Pending Amt</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Tabs -->
    <div class="flex gap-1.5 sm:gap-2 mb-3 sm:mb-4 flex-wrap">
        <button onclick="filterByCategory('all')" id="tabAll" class="tab-active px-3 sm:px-5 py-2 sm:py-2.5 text-xs sm:text-sm font-semibold rounded-lg sm:rounded-xl category-btn shadow-sm flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            All
        </button>
        <button onclick="filterByCategory('cash')" id="tabCash" class="px-3 sm:px-5 py-2 sm:py-2.5 bg-white border-2 border-slate-200 text-slate-700 text-xs sm:text-sm font-semibold rounded-lg sm:rounded-xl hover:border-emerald-300 category-btn shadow-sm flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            Cash (<span id="cashCount">0</span>)
        </button>
        <button onclick="filterByCategory('card')" id="tabCard" class="px-3 sm:px-5 py-2 sm:py-2.5 bg-white border-2 border-slate-200 text-slate-700 text-xs sm:text-sm font-semibold rounded-lg sm:rounded-xl hover:border-blue-300 category-btn shadow-sm flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
            Card (<span id="cardCount">0</span>)
        </button>
        <button onclick="filterByCategory('credit')" id="tabCredit" class="px-3 sm:px-5 py-2 sm:py-2.5 bg-white border-2 border-slate-200 text-slate-700 text-xs sm:text-sm font-semibold rounded-lg sm:rounded-xl hover:border-amber-300 category-btn shadow-sm flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
            Credit (<span id="creditCount">0</span>)
        </button>
        <button onclick="filterByCategory('check')" id="tabCheck" class="px-3 sm:px-5 py-2 sm:py-2.5 bg-white border-2 border-slate-200 text-slate-700 text-xs sm:text-sm font-semibold rounded-lg sm:rounded-xl hover:border-purple-300 category-btn shadow-sm flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-purple-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
            Cheque (<span id="checkCount">0</span>)
        </button>
    </div>
    
    <!-- Bills Table -->
    <div class="glass-card rounded-xl sm:rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-xs sm:text-sm">
                <thead><tr class="bg-slate-900 text-white">
                    <th class="px-3 sm:px-4 py-2 sm:py-3 text-left font-medium">Invoice #</th>
                    <th class="px-3 sm:px-4 py-2 sm:py-3 text-left font-medium hidden md:table-cell">Date</th>
                    <th class="px-3 sm:px-4 py-2 sm:py-3 text-left font-medium">Customer</th>
                    <th class="px-3 sm:px-4 py-2 sm:py-3 text-right font-medium">Total</th>
                    <th class="px-3 sm:px-4 py-2 sm:py-3 text-left font-medium hidden md:table-cell">Type</th>
                    <th class="px-3 sm:px-4 py-2 sm:py-3 text-center font-medium">Status</th>
                    <th class="px-3 sm:px-4 py-2 sm:py-3 text-center font-medium">View</th>
                </tr></thead>
                <tbody id="billsTable" class="divide-y divide-slate-100">
                    <tr><td colspan="7" class="px-4 py-8 text-center text-slate-400">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- View Invoice Modal -->
<div id="viewInvoiceModal" class="fixed inset-0 modal-backdrop hidden items-center justify-center z-50 p-2 sm:p-4">
    <div class="bg-white rounded-2xl sm:rounded-3xl shadow-2xl w-full max-w-lg max-h-[95vh] overflow-y-auto p-4 sm:p-6">
        <div class="flex justify-between items-center mb-3 sm:mb-4">
            <h3 class="text-lg sm:text-xl font-bold flex items-center gap-2">
                <span class="w-8 h-8 gradient-indigo rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg>
                </span>
                <span id="documentModalTitle">Invoice Details</span>
            </h3>
            <div class="flex gap-2">
                <button onclick="printBill()" class="bg-slate-100 px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg sm:rounded-xl text-xs sm:text-sm font-medium hover:bg-slate-200 flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 12H4a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    Print
                </button>
                <button onclick="closeInvoiceModal()" class="bg-slate-200 px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg sm:rounded-xl text-xs sm:text-sm font-medium">Close</button>
            </div>
        </div>
        <div id="viewInvoiceContent" class="text-sm"></div>
    </div>
</div>

<script>
document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
var currentCategory = 'all';

function syncDate(){ document.getElementById('filterDate').value = document.getElementById('filterDateMobile').value; loadBills(); }
function closeInvoiceModal(){ var m=document.getElementById('viewInvoiceModal'); m.classList.add('hidden'); m.classList.remove('flex'); }

function billsSkeleton(){
    return Array.from({length:5}).map(function(){
        return '<tr><td colspan="7" class="px-4 py-3"><div class="space-y-2"><div class="skeleton-line h-4 w-1/3"></div><div class="skeleton-line h-3 w-2/3"></div></div></td></tr>';
    }).join('');
}

function filterByCategory(cat){
    currentCategory=cat;
    document.querySelectorAll('.category-btn').forEach(function(b){b.classList.remove('tab-active');b.classList.add('bg-white','border-2','border-slate-200','text-slate-700');});
    var a=document.getElementById('tab'+cat.charAt(0).toUpperCase()+cat.slice(1));
    if(a){a.classList.add('tab-active');a.classList.remove('bg-white','border-slate-200','text-slate-700');}
    loadBills();
}

function loadBills(){
    var date=document.getElementById('filterDate').value;
    var payment=document.getElementById('filterPayment').value;
    var search=(document.getElementById('searchQuery').value||'').toLowerCase();
    
    var url='/api/orders/all?'; if(date) url+='date='+date+'&'; url+='payment='+payment+'&q='+encodeURIComponent(search);
    document.getElementById('billsTable').innerHTML=billsSkeleton();
    
    fetch(url).then(function(r){return r.json();}).then(function(data){
        var allOrders=data.orders;
        if(currentCategory!=='all'){ allOrders=allOrders.filter(function(o){return o.payment_method===currentCategory || o.balance_payment_method===currentCategory;}); }
        
        var cashOrders=data.orders.filter(function(o){return o.payment_method==='cash' || o.balance_payment_method==='cash';});
        var cardOrders=data.orders.filter(function(o){return o.payment_method==='card' || o.balance_payment_method==='card';});
        var creditOrders=data.orders.filter(function(o){return o.payment_method==='credit';});
        var checkOrders=data.orders.filter(function(o){return o.payment_method==='check' || o.balance_payment_method==='check';});
        document.getElementById('cashCount').textContent=cashOrders.length;
        document.getElementById('cardCount').textContent=cardOrders.length;
        document.getElementById('creditCount').textContent=creditOrders.length;
        document.getElementById('checkCount').textContent=checkOrders.length;
        
        document.getElementById('totalBills').textContent=allOrders.length;
        document.getElementById('totalSales').textContent=money(allOrders.reduce(function(s,o){return s+(o.total||0);},0));
        var pending=allOrders.filter(function(o){return o.payment_status==='pending';});
        document.getElementById('pendingPayments').textContent=pending.length;
        document.getElementById('pendingAmount').textContent=money(pending.reduce(function(s,o){return s+(o.total||0);},0));
        
        var tbody=document.getElementById('billsTable');
        if(!allOrders.length){tbody.innerHTML='<tr><td colspan="7" class="px-4 py-8 text-center text-slate-400"><p class="font-medium text-slate-600">No bills found</p><p class="text-xs mt-1">Try another date, type, or search term.</p></td></tr>';return;}
        tbody.innerHTML=allOrders.map(function(o){
            var invoiceNumber = o.invoice_number || o.order_number;
            var isReturn = o.row_kind === 'return';
            var typeText = formatType(o.payment_method) + (o.balance_payment_method ? ' + ' + formatType(o.balance_payment_method) : '');
            var statusClass = isReturn ? 'bg-rose-50 text-rose-700 border border-rose-100' : (o.payment_status==='completed'?'bg-emerald-100 text-emerald-800':'bg-amber-100 text-amber-800');
            return '<tr class="hover:bg-slate-50 transition">'+
                '<td class="px-3 sm:px-4 py-2 sm:py-3 font-semibold '+(isReturn?'text-rose-600':'text-indigo-600')+' flex items-center gap-1">'+escapeHtml(invoiceNumber)+' <button onclick="event.stopPropagation();copyToClipboard(\''+escapeHtml(invoiceNumber)+'\')" title="Copy" class="text-slate-300 hover:text-indigo-500 transition"><svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button></td>'+
                '<td class="px-3 sm:px-4 py-2 sm:py-3 text-xs text-slate-500 hidden md:table-cell">'+o.created_at+'</td>'+
                '<td class="px-3 sm:px-4 py-2 sm:py-3 font-medium">'+escapeHtml(o.customer_name||'Walk-in')+'</td>'+
                '<td class="px-3 sm:px-4 py-2 sm:py-3 text-right font-bold">'+money(o.total||0)+'</td>'+
                '<td class="px-3 sm:px-4 py-2 sm:py-3 hidden md:table-cell"><span class="text-xs font-semibold uppercase">'+escapeHtml(typeText)+'</span></td>'+
                '<td class="px-3 sm:px-4 py-2 sm:py-3 text-center"><span class="px-2 py-0.5 rounded-full text-xs font-medium '+statusClass+'">'+escapeHtml(o.payment_status||o.status||'')+'</span></td>'+
                '<td class="px-3 sm:px-4 py-2 sm:py-3 text-center"><button onclick="'+(isReturn?'viewReturn':'viewBill')+'(\''+escapeHtml(invoiceNumber)+'\')" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-medium text-xs sm:text-sm px-3 py-1.5 rounded-lg transition">View</button></td></tr>';
        }).join('');
    }).catch(function(){document.getElementById('billsTable').innerHTML='<tr><td colspan="7" class="px-4 py-8 text-center text-red-500">Could not load bills. <button onclick="loadBills()" class="underline font-medium">Retry</button></td></tr>';});
}

function formatType(value) {
    if (!value) return '';
    var labels = {cash:'Cash', card:'Card', check:'Cheque', credit:'Credit', credit_note:'Credit Note', bank_transfer:'Bank Transfer'};
    return labels[value] || String(value).replace(/_/g, ' ');
}

function viewBill(orderNumber){
    fetch('/api/orders/'+orderNumber+'/details').then(function(r){return r.json();}).then(function(order){
        document.getElementById('documentModalTitle').textContent = 'Invoice Details';
        var itemsHtml = (order.items||[]).map(function(i){return '<tr style="border-bottom: 0.5px solid #d1d5db;"><td style="padding: 1px 0; font-size: 14px;">'+i.name+'</td><td style="text-align: right; font-size: 14px;">'+i.quantity+'</td><td style="text-align: right; font-size: 14px;">Rs.'+i.price.toFixed(2)+'</td><td style="text-align: right; font-size: 14px;">Rs.'+i.total.toFixed(2)+'</td></tr>';}).join('');
        
        var creditInfo = '';
        if (order.payment_method === 'credit' || order.sale_type === 'payment') {

            return '<tr style="border-bottom: 0.5px solid #d1d5db;">'+
                '<td style="padding: 1px 0; font-size: 14px;">'+escapeHtml(i.name)+'</td>'+
                '<td style="text-align: right; font-size: 14px;">'+i.quantity+'</td>'+
                '<td style="text-align: right; font-size: 14px;">Rs.'+Number(i.price||0).toFixed(2)+'</td>'+

function printBill(){
    var c = document.getElementById('viewInvoiceContent').innerHTML;
    var w = window.open('','','width=800,height=600');
    w.document.write(
        '<html><head><title>Bill</title>' +
        '<style>' +
        '@page { size: 8in 5.5in; margin: 4mm; }' +
        '@media print { body { width: 100%; margin: 0; padding: 0; font-size: 15px; line-height: 1.15; } }' +
        'body { font-family: Arial, Helvetica, sans-serif; font-weight: 300; font-size: 15px; max-width: 100%; margin: 0 auto; padding: 4px 0px; background: #fff; color: #000; line-height: 1.15; }' +
        'table { width: 100%; border-collapse: collapse; }' +
        '</style></head>' +
        '<body>' + c + '<script>setTimeout(function(){window.print();}, 400);<\/script></body></html>'
    );
    w.document.close();
}
