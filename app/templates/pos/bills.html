{% extends "base.html" %}

{% block title %}Bill History{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-4">
    
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
            <svg class="w-6 h-6 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line>
            </svg>
            Bill History
        </h1>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-4">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Date</label>
                <input type="date" id="filterDate" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-sm focus:border-indigo-400 focus:outline-none" onchange="loadBills()">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Type</label>
                <select id="filterType" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-sm focus:border-indigo-400 focus:outline-none" onchange="loadBills()">
                    <option value="all">All Sales</option>
                    <option value="retail">Retail</option>
                    <option value="wholesale">Wholesale</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Payment</label>
                <select id="filterPayment" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2 text-sm focus:border-indigo-400 focus:outline-none" onchange="loadBills()">
                    <option value="all">All Payments</option>
                    <option value="cash">Cash</option>
                    <option value="card">Card</option>
                    <option value="credit">Credit</option>
                </select>
            </div>
            <div class="flex items-end">
                <button onclick="loadBills()" class="w-full bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-indigo-700 transition">
                    <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Search
                </button>
            </div>
        </div>
    </div>
    
    <!-- Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-2xl font-bold text-slate-800" id="totalBills">0</p>
                    <p class="text-xs text-slate-400">Total Bills</p>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-2xl font-bold text-slate-800" id="totalSales">$0</p>
                    <p class="text-xs text-slate-400">Total Sales</p>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-amber-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <div>
                    <p class="text-2xl font-bold text-slate-800" id="pendingPayments">0</p>
                    <p class="text-xs text-slate-400">Pending</p>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-red-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                        <line x1="2" y1="10" x2="22" y2="10"></line>
                    </svg>
                </div>
                <div>
                    <p class="text-2xl font-bold text-slate-800" id="pendingAmount">$0</p>
                    <p class="text-xs text-slate-400">Pending Amount</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Tabs -->
    <div class="flex gap-2 mb-4 flex-wrap" id="categoryTabs">
        <button onclick="filterByCategory('all')" class="px-4 py-2 bg-slate-800 text-white text-sm font-medium rounded-xl category-btn">All</button>
        <button onclick="filterByCategory('cash')" class="px-4 py-2 bg-white border-2 border-slate-200 text-slate-700 text-sm font-medium rounded-xl hover:border-emerald-300 category-btn">
            💵 Cash (<span id="cashCount">0</span>)
        </button>
        <button onclick="filterByCategory('card')" class="px-4 py-2 bg-white border-2 border-slate-200 text-slate-700 text-sm font-medium rounded-xl hover:border-blue-300 category-btn">
            💳 Card (<span id="cardCount">0</span>)
        </button>
        <button onclick="filterByCategory('credit')" class="px-4 py-2 bg-white border-2 border-slate-200 text-slate-700 text-sm font-medium rounded-xl hover:border-amber-300 category-btn">
            📋 Credit (<span id="creditCount">0</span>)
        </button>
    </div>
    
    <!-- Bills Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead><tr class="bg-slate-800 text-white">
                    <th class="px-4 py-3 text-left font-medium">Invoice #</th>
                    <th class="px-4 py-3 text-left font-medium hidden md:table-cell">Date/Time</th>
                    <th class="px-4 py-3 text-left font-medium">Customer</th>
                    <th class="px-4 py-3 text-left font-medium hidden lg:table-cell">Type</th>
                    <th class="px-4 py-3 text-center font-medium hidden sm:table-cell">Items</th>
                    <th class="px-4 py-3 text-right font-medium">Total</th>
                    <th class="px-4 py-3 text-left font-medium hidden md:table-cell">Payment</th>
                    <th class="px-4 py-3 text-center font-medium">Status</th>
                    <th class="px-4 py-3 text-center font-medium">Action</th>
                </tr></thead>
                <tbody id="billsTable" class="divide-y divide-slate-100">
                    <tr><td colspan="9" class="px-4 py-8 text-center text-slate-400">Loading today's bills...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- View Invoice Modal -->
<div id="viewInvoiceModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                </svg>
                Invoice Details
            </h3>
            <div class="flex gap-2">
                <button onclick="printBill()" class="bg-slate-100 px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-200">
                    🖨️ Print
                </button>
                <button onclick="closeInvoiceModal()" class="bg-slate-200 px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-300">Close</button>
            </div>
        </div>
        <div id="viewInvoiceContent"></div>
    </div>
</div>

<script>
// Set today's date by default
document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];

var currentCategory = 'all';

function closeInvoiceModal() {
    var modal = document.getElementById('viewInvoiceModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function filterByCategory(cat) {
    currentCategory = cat;
    
    // Update active button styles
    document.querySelectorAll('.category-btn').forEach(function(btn) {
        if (cat === 'all' && btn.textContent.includes('All')) {
            btn.className = 'px-4 py-2 bg-slate-800 text-white text-sm font-medium rounded-xl category-btn';
        } else if (btn.textContent.toLowerCase().includes(cat) && cat !== 'all') {
            btn.className = 'px-4 py-2 bg-slate-800 text-white text-sm font-medium rounded-xl category-btn';
        } else {
            btn.className = 'px-4 py-2 bg-white border-2 border-slate-200 text-slate-700 text-sm font-medium rounded-xl hover:border-slate-300 category-btn';
        }
    });
    
    loadBills();
}

function loadBills() {
    var date = document.getElementById('filterDate').value;
    var type = document.getElementById('filterType').value;
    var payment = document.getElementById('filterPayment').value;
    
    // Build URL with date filter
    var url = '/api/orders/all?';
    if (date) url += 'date=' + date + '&';
    url += 'type=' + type + '&payment=' + payment;
    
    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var allOrders = data.orders;
            
            // Filter by category
            if (currentCategory !== 'all') {
                allOrders = allOrders.filter(function(o) {
                    return o.payment_method === currentCategory;
                });
            }
            
            // Update counts
            var cashOrders = data.orders.filter(function(o) { return o.payment_method === 'cash'; });
            var cardOrders = data.orders.filter(function(o) { return o.payment_method === 'card'; });
            var creditOrders = data.orders.filter(function(o) { return o.payment_method === 'credit'; });
            
            document.getElementById('cashCount').textContent = cashOrders.length;
            document.getElementById('cardCount').textContent = cardOrders.length;
            document.getElementById('creditCount').textContent = creditOrders.length;
            
            // Update stats
            document.getElementById('totalBills').textContent = allOrders.length;
            document.getElementById('totalSales').textContent = '$' + allOrders.reduce(function(s, o) { return s + (o.total || 0); }, 0).toFixed(2);
            
            var pending = allOrders.filter(function(o) { return o.payment_status === 'pending'; });
            document.getElementById('pendingPayments').textContent = pending.length;
            document.getElementById('pendingAmount').textContent = '$' + pending.reduce(function(s, o) { return s + (o.total || 0); }, 0).toFixed(2);
            
            var tbody = document.getElementById('billsTable');
            
            if (!allOrders.length) {
                tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-8 text-center text-slate-400">No bills found for ' + (currentCategory !== 'all' ? currentCategory : 'this filter') + '</td></tr>';
                return;
            }
            
            tbody.innerHTML = allOrders.map(function(o) {
                return '<tr class="hover:bg-slate-50 transition">' +
                    '<td class="px-4 py-3 font-medium text-indigo-600">' + o.order_number + '</td>' +
                    '<td class="px-4 py-3 text-xs text-slate-500 hidden md:table-cell">' + o.created_at + '</td>' +
                    '<td class="px-4 py-3 text-sm">' + (o.customer_name || 'Walk-in') + '</td>' +
                    '<td class="px-4 py-3 hidden lg:table-cell">' +
                        '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + (o.sale_type === 'wholesale' ? 'bg-amber-100 text-amber-800' : 'bg-blue-100 text-blue-800') + '">' + (o.sale_type || 'retail') + '</span>' +
                    '</td>' +
                    '<td class="px-4 py-3 text-center hidden sm:table-cell">' + o.item_count + '</td>' +
                    '<td class="px-4 py-3 text-right font-semibold">$' + (o.total || 0).toFixed(2) + '</td>' +
                    '<td class="px-4 py-3 hidden md:table-cell"><span class="text-xs font-medium uppercase">' + o.payment_method + '</span></td>' +
                    '<td class="px-4 py-3 text-center">' +
                        '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + (o.payment_status === 'completed' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800') + '">' + o.payment_status + '</span>' +
                    '</td>' +
                    '<td class="px-4 py-3 text-center">' +
                        '<button onclick="viewBill(\'' + o.order_number + '\')" class="text-indigo-600 hover:text-indigo-800 font-medium text-sm hover:underline">View</button>' +
                    '</td>' +
                '</tr>';
            }).join('');
        });
}

function viewBill(orderNumber) {
    fetch('/api/orders/' + orderNumber + '/details')
        .then(function(r) { return r.json(); })
        .then(function(order) {
            document.getElementById('viewInvoiceContent').innerHTML = 
                '<div class="font-mono text-sm max-w-sm mx-auto">' +
                '<div class="text-center border-b-2 border-dashed border-slate-300 pb-3 mb-3">' +
                '<h4 class="font-bold text-lg">🏪 FURNITURE WAREHOUSE</h4>' +
                '<p class="text-slate-500">Invoice: ' + order.order_number + '</p>' +
                '<p class="text-slate-400 text-xs">' + order.created_at + '</p></div>' +
                '<p><strong>Customer:</strong> ' + order.customer_name + '</p>' +
                '<p><strong>Phone:</strong> ' + (order.customer_phone || 'N/A') + '</p>' +
                '<table class="w-full my-3 text-xs">' +
                '<tr class="border-b border-slate-300"><th class="text-left py-1">Item</th><th class="text-right">Qty</th><th class="text-right">Price</th><th class="text-right">Total</th></tr>' +
                (order.items || []).map(function(i) { return '<tr><td class="py-1">' + i.name + '</td><td class="text-right">' + i.quantity + '</td><td class="text-right">$' + i.price.toFixed(2) + '</td><td class="text-right">$' + i.total.toFixed(2) + '</td></tr>'; }).join('') +
                '</table>' +
                '<div class="border-t-2 border-slate-300 pt-2 space-y-1">' +
                '<p class="flex justify-between"><span>Subtotal</span><span>$' + (order.subtotal || 0).toFixed(2) + '</span></p>' +
                '<p class="flex justify-between text-red-500"><span>Discount</span><span>-$' + (order.discount || 0).toFixed(2) + '</span></p>' +
                '<p class="flex justify-between"><span>Delivery</span><span>$' + (order.delivery || 0).toFixed(2) + '</span></p>' +
                '<p class="flex justify-between font-bold text-lg border-t border-slate-300 pt-2"><span>TOTAL</span><span class="text-indigo-600">$' + (order.total || 0).toFixed(2) + '</span></p>' +
                '</div>' +
                '<p class="mt-2"><strong>Payment:</strong> ' + (order.payment_method || '').toUpperCase() + '</p>' +
                '<p><strong>Status:</strong> ' + (order.payment_status || '').toUpperCase() + '</p>' +
                '<p class="text-center text-slate-400 mt-3 text-xs">Thank you for your purchase!</p></div>';
            
            var modal = document.getElementById('viewInvoiceModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        });
}

function printBill() {
    var content = document.getElementById('viewInvoiceContent').innerHTML;
    var win = window.open('', '', 'width=400,height=600');
    win.document.write('<html><head><title>Bill</title></head><body class="p-4">' + content + '<script>window.print();<\/script></body></html>');
    win.document.close();
}

// Load on page open
loadBills();

// Auto refresh every 10 seconds
setInterval(loadBills, 10000);

// Refresh when tab is visible
window.addEventListener('focus', loadBills);
document.addEventListener('visibilitychange', function() {
    if (!document.hidden) loadBills();
});
</script>
{% endblock %}
