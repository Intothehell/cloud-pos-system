{% extends "base.html" %}

{% block title %}POS Terminal{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2><i class="fas fa-cash-register"></i> POS Terminal</h2>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h5>Products</h5>
                <div class="input-group mb-3">
                    <input type="text" id="barcodeInput" class="form-control form-control-lg" 
                           placeholder="Scan barcode or search product..." autofocus>
                    <button class="btn btn-primary" onclick="searchProducts()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
                
                <div id="productList" class="row">
                    <p class="text-muted">Scan a barcode or search for products</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="fas fa-shopping-cart"></i> Current Sale</h5>
            </div>
            <div class="card-body" id="cartItems">
                <p class="text-muted">Cart is empty</p>
            </div>
            <div class="card-footer">
                <div id="cartTotal">
                    <h4 class="text-end">Total: $0.00</h4>
                </div>
                <button class="btn btn-success btn-lg w-100 mt-2" onclick="processPayment()">
                    <i class="fas fa-credit-card"></i> Pay Now
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Focus on barcode input
document.getElementById('barcodeInput').focus();

// Re-focus when clicking anywhere
document.addEventListener('click', function() {
    document.getElementById('barcodeInput').focus();
});

// Handle barcode input
document.getElementById('barcodeInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        var barcode = this.value;
        alert('Barcode scanned: ' + barcode + ' (Product search coming soon!)');
        this.value = '';
    }
});

function searchProducts() {
    alert('Product search feature coming soon!');
}

function processPayment() {
    alert('Payment processing coming soon!');
}
</script>
{% endblock %}
