{% extends "base.html" %}

{% block title %}Returns & Refunds{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-4">
    
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
            <svg class="w-6 h-6 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 14 4 9 9 4"></polyline>
                <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
            </svg>
            Returns & Refunds
        </h1>
    </div>

    <!-- Search Order -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-4">
        <label class="block text-sm font-semibold text-slate-600 mb-2">Search Order to Return</label>
        <div class="flex gap-3">
            <input type="text" id="returnSearch" class="flex-1 border-2 border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-red-400 focus:outline-none" placeholder="Enter invoice number (e.g. RET-20260501-0001)...">
            <button onclick="searchOrder()" class="bg-red-500 text-white px-6 py-3 rounded-xl font-medium hover:bg-red-600 transition">Search</button>
        </div>
    </div>

    <!-- Order Details & Return Form -->
    <div id="orderDetails" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-4"></div>

    <!-- Return History -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="px-4 py-3 bg-slate-800 text-white font-medium text-sm flex items-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 14 4 9 9 4"></polyline>
                <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
            </svg>
            Return History
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead><tr class="bg-slate-100">
                    <th class="px-4 py-2 text-left">Return #</th>
                    <th class="px-4 py-2 text-left">Order #</th>
                    <th class="px-4 py-2 text-left">Customer</th>
                    <th class="px-4 py-2 text-left">Type</th>
                    <th class="px-4 py-2 text-right">Amount</th>
                    <th class="px-4 py-2 text-left hidden md:table-cell">Reason</th>
                    <th class="px-4 py-2 text-left hidden md:table-cell">Date</th>
                    <th class="px-4 py-2 text-center">Status</th>
                </tr></thead>
                <tbody id="returnTable" class="divide-y divide-slate-100">
                    <tr><td colspan="8" class="px-4 py-8 text-center text-slate-400">Loading returns...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function searchOrder() {
    var orderNum = document.getElementById('returnSearch').value.trim();
    if (!orderNum) return;
    
    fetch('/api/orders/' + orderNum + '/details')
        .then(function(r) { return r.json(); })
        .then(function(order) {
            if (order.error) {
                alert('Order not found!');
                return;
            }
            
            var div = document.getElementById('orderDetails');
            div.classList.remove('hidden');
            div.innerHTML = 
                '<h3 class="font-bold text-lg mb-3">📋 Order: ' + order.order_number + '</h3>' +
                '<div class="grid grid-cols-2 gap-4 mb-4">' +
                '<div>' +
                    '<p><strong>Customer:</strong> ' + order.customer_name + '</p>' +
                    '<p><strong>Phone:</strong> ' + (order.customer_phone || 'N/A') + '</p>' +
                    '<p><strong>Date:</strong> ' + order.created_at + '</p>' +
                '</div>' +
                '<div>' +
                    '<p><strong>Total:</strong> <span class="text-lg font-bold">$' + order.total.toFixed(2) + '</span></p>' +
                    '<p><strong>Payment:</strong> ' + order.payment_method.toUpperCase() + '</p>' +
                    '<p><strong>Status:</strong> ' + order.payment_status.toUpperCase() + '</p>' +
                '</div></div>' +
                
                '<div class="border-t pt-4">' +
                '<h4 class="font-semibold mb-3">Process Return</h4>' +
                
                '<div class="grid grid-cols-2 gap-4 mb-3">' +
                    '<div>' +
                        '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Return Type</label>' +
                        '<select id="returnType" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:border-red-400 focus:outline-none" onchange="toggleReturnType()">' +
                            '<option value="refund">💰 Refund Money</option>' +
                            '<option value="replacement">🔄 Replacement Item</option>' +
                            '<option value="credit_note">📝 Credit Note</option>' +
                        '</select>' +
                    '</div>' +
                    '<div id="refundAmountDiv">' +
                        '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Refund Amount</label>' +
                        '<input type="number" id="refundAmount" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:border-red-400 focus:outline-none" value="' + order.total + '" step="0.01">' +
                    '</div>' +
                    '<div id="replacementDiv" class="hidden">' +
                        '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Replacement Product</label>' +
                        '<input type="text" id="replacementProduct" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm" placeholder="Scan barcode...">' +
                        '<input type="hidden" id="replacementProductId">' +
                        '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1 mt-2">Quantity</label>' +
                        '<input type="number" id="replacementQty" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm" value="1" min="1">' +
                    '</div>' +
                '</div>' +
                
                '<div class="mb-3">' +
                    '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Reason for Return</label>' +
                    '<textarea id="returnReason" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:border-red-400 focus:outline-none" rows="2" placeholder="Enter reason..."></textarea>' +
                '</div>' +
                
                '<div class="mb-3">' +
                    '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Refund Method</label>' +
                    '<select id="refundMethod" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:border-red-400 focus:outline-none">' +
                        '<option value="cash">Cash</option>' +
                        '<option value="card">Card</option>' +
                        '<option value="credit_note">Credit Note</option>' +
                    '</select>' +
                '</div>' +
                
                '<button onclick="processReturn(\'' + order.order_number + '\')" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold hover:bg-red-600 transition text-lg">' +
                    'Process Return' +
                '</button>' +
                '</div>';
        });
}

function toggleReturnType() {
    var type = document.getElementById('returnType').value;
    document.getElementById('refundAmountDiv').classList.toggle('hidden', type === 'replacement');
    document.getElementById('replacementDiv').classList.toggle('hidden', type !== 'replacement');
    document.getElementById('refundMethod').parentElement.classList.toggle('hidden', type === 'replacement');
}

// Barcode scan for replacement
document.addEventListener('keydown', function(e) {
    if (e.target.id === 'replacementProduct') {
        if (e.key === 'Enter') {
            e.preventDefault();
            var barcode = e.target.value.trim();
            fetch('/api/product/barcode/' + barcode)
                .then(r => r.json())
                .then(p => {
                    if (p.id) {
                        document.getElementById('replacementProduct').value = p.name;
                        document.getElementById('replacementProductId').value = p.id;
                    } else {
                        alert('Product not found!');
                    }
                });
        }
    }
});

function processReturn(orderNumber) {
    var type = document.getElementById('returnType').value;
    var reason = document.getElementById('returnReason').value;
    var amount = parseFloat(document.getElementById('refundAmount').value) || 0;
    var method = document.getElementById('refundMethod').value;
    
    if (!reason) { alert('Enter reason!'); return; }
    
    var data = {
        return_type: type,
        reason: reason,
        refund_amount: amount,
        refund_method: method
    };
    
    if (type === 'replacement') {
        data.replacement_product_id = document.getElementById('replacementProductId').value;
        data.replacement_quantity = parseInt(document.getElementById('replacementQty').value) || 1;
        data.refund_amount = 0;
    }
    
    fetch('/api/orders/' + orderNumber + '/return', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
        if (result.success) {
            alert('✅ ' + result.message);
            document.getElementById('orderDetails').classList.add('hidden');
            document.getElementById('returnSearch').value = '';
            loadReturns();
            if (type === 'refund' && method === 'cash') fetch('/api/open-drawer');
        } else {
            alert('❌ Error: ' + result.error);
        }
    });
}

function loadReturns() {
    fetch('/api/returns/all')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var tbody = document.getElementById('returnTable');
            
            if (!data.returns.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-slate-400">No returns yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.returns.map(function(r) {
                return '<tr class="hover:bg-slate-50">' +
                    '<td class="px-4 py-2 font-medium text-red-600">' + r.return_number + '</td>' +
                    '<td class="px-4 py-2">' + r.order_number + '</td>' +
                    '<td class="px-4 py-2 text-sm">' + r.customer + '</td>' +
                    '<td class="px-4 py-2"><span class="px-2 py-0.5 rounded-full text-xs ' +
                        (r.type === 'refund' ? 'bg-red-100 text-red-800' : r.type === 'replacement' ? 'bg-blue-100 text-blue-800' : 'bg-amber-100 text-amber-800') + '">' +
                        r.type + '</span></td>' +
                    '<td class="px-4 py-2 text-right font-semibold ' + (r.refund_amount > 0 ? 'text-red-600' : '') + '">$' + r.refund_amount.toFixed(2) + '</td>' +
                    '<td class="px-4 py-2 text-xs hidden md:table-cell">' + (r.reason ? r.reason.substring(0, 30) : '') + '</td>' +
                    '<td class="px-4 py-2 text-xs hidden md:table-cell">' + r.created_at + '</td>' +
                    '<td class="px-4 py-2 text-center"><span class="px-2 py-0.5 rounded-full text-xs bg-emerald-100 text-emerald-800">' + r.status + '</span></td>' +
                '</tr>';
            }).join('');
        });
}

// Load returns on page open
loadReturns();
setInterval(loadReturns, 10000);
</script>
{% endblock %}
