{% extends "base.html" %}

{% block title %}Returns & Refunds{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 30%, #fdf2f8 70%, #fef3c7 100%);
        min-height: 100vh;
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    }
    .gradient-rose { background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); }
    .gradient-blue { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
    .gradient-amber { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .gradient-emerald { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .gradient-indigo { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .modal-backdrop { backdrop-filter: blur(4px); background: rgba(0,0,0,0.4); }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-4">
    
    <!-- Header -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
            <span class="w-10 h-10 gradient-rose rounded-xl flex items-center justify-center shadow-lg">
                <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 14 4 9 9 4"></polyline>
                    <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
                </svg>
            </span>
            Returns & Refunds
        </h1>
    </div>

    <!-- Search Order -->
    <div class="glass-card rounded-2xl p-5 mb-4">
        <label class="block text-sm font-semibold text-slate-600 mb-3 flex items-center gap-2">
            <svg class="w-5 h-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            Search Order to Return
        </label>
        <div class="flex gap-3">
            <input type="text" id="returnSearch" class="flex-1 border-2 border-slate-200 rounded-xl px-4 py-3 text-sm bg-white/80 focus:border-red-400 focus:outline-none" placeholder="Enter invoice number (e.g. RET-20260501-0001)...">
            <button onclick="searchOrder()" class="gradient-rose text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition shadow-lg flex items-center gap-2">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                Search
            </button>
        </div>
    </div>

    <!-- Order Details & Return Form -->
    <div id="orderDetails" class="hidden glass-card rounded-2xl p-6 mb-4"></div>

    <!-- Return History -->
    <div class="glass-card rounded-2xl overflow-hidden">
        <div class="px-5 py-3 gradient-indigo text-white font-semibold text-sm flex items-center gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 14 4 9 9 4"></polyline>
                <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
            </svg>
            Return History
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead><tr class="bg-slate-50">
                    <th class="px-4 py-3 text-left font-semibold text-slate-600">Return #</th>
                    <th class="px-4 py-3 text-left font-semibold text-slate-600">Order #</th>
                    <th class="px-4 py-3 text-left font-semibold text-slate-600">Customer</th>
                    <th class="px-4 py-3 text-left font-semibold text-slate-600">Type</th>
                    <th class="px-4 py-3 text-right font-semibold text-slate-600">Amount</th>
                    <th class="px-4 py-3 text-left font-semibold text-slate-600 hidden md:table-cell">Reason</th>
                    <th class="px-4 py-3 text-left font-semibold text-slate-600 hidden md:table-cell">Date</th>
                    <th class="px-4 py-3 text-center font-semibold text-slate-600">Status</th>
                </tr></thead>
                <tbody id="returnTable" class="divide-y divide-slate-100">
                    <tr><td colspan="8" class="px-4 py-8 text-center text-slate-400">
                        <svg class="w-8 h-8 mx-auto mb-2 animate-spin text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path>
                        </svg>
                        Loading returns...
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function searchOrder() {
    var orderNum = document.getElementById('returnSearch').value.trim();
    if (!orderNum) return;
    
    fetch('/api/orders/' + orderNum + '/details')
        .then(function(r) { return r.json(); })
        .then(function(order) {
            if (order.error) { alert('Order not found!'); return; }
            
            var div = document.getElementById('orderDetails');
            div.classList.remove('hidden');
            div.innerHTML = 
                '<div class="flex justify-between items-start mb-4">' +
                    '<h3 class="font-bold text-lg flex items-center gap-2">' +
                        '<svg class="w-5 h-5 text-indigo-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>' +
                        'Order: <span class="text-indigo-600">' + order.order_number + '</span>' +
                    '</h3>' +
                    '<button onclick="document.getElementById(\'orderDetails\').classList.add(\'hidden\')" class="text-slate-400 hover:text-red-500">' +
                        '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>' +
                    '</button>' +
                '</div>' +
                '<div class="grid grid-cols-2 gap-4 mb-4 p-4 bg-slate-50 rounded-xl">' +
                    '<div>' +
                        '<p class="text-sm"><strong>Customer:</strong> ' + order.customer_name + '</p>' +
                        '<p class="text-sm"><strong>Phone:</strong> ' + (order.customer_phone || 'N/A') + '</p>' +
                        '<p class="text-sm"><strong>Date:</strong> ' + order.created_at + '</p>' +
                    '</div>' +
                    '<div>' +
                        '<p class="text-sm"><strong>Total:</strong> <span class="text-lg font-bold text-slate-800">Rs.' + order.total.toFixed(2) + '</span></p>' +
                        '<p class="text-sm"><strong>Payment:</strong> <span class="uppercase font-medium">' + order.payment_method + '</span></p>' +
                        '<p class="text-sm"><strong>Status:</strong> <span class="px-2 py-0.5 rounded-full text-xs ' + (order.payment_status === 'completed' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800') + '">' + order.payment_status + '</span></p>' +
                    '</div>' +
                '</div>' +
                
                '<div class="border-t border-slate-200 pt-4">' +
                '<h4 class="font-semibold text-slate-700 mb-3 flex items-center gap-2">' +
                    '<svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></svg>' +
                    'Process Return' +
                '</h4>' +
                
                '<div class="grid grid-cols-2 gap-4 mb-3">' +
                    '<div>' +
                        '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Return Type</label>' +
                        '<select id="returnType" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white/80 focus:border-red-400 focus:outline-none" onchange="toggleReturnType()">' +
                            '<option value="refund">Refund Money</option>' +
                            '<option value="replacement">Replacement Item</option>' +
                            '<option value="credit_note">Credit Note</option>' +
                        '</select>' +
                    '</div>' +
                    '<div id="refundAmountDiv">' +
                        '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Refund Amount</label>' +
                        '<input type="number" id="refundAmount" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white/80 focus:border-red-400 focus:outline-none" value="' + order.total + '" step="0.01">' +
                    '</div>' +
                    '<div id="replacementDiv" class="hidden">' +
                        '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Replacement Product</label>' +
                        '<input type="text" id="replacementProduct" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white/80" placeholder="Scan barcode...">' +
                        '<input type="hidden" id="replacementProductId">' +
                        '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1 mt-2">Quantity</label>' +
                        '<input type="number" id="replacementQty" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white/80" value="1" min="1">' +
                    '</div>' +
                '</div>' +
                
                '<div class="mb-3">' +
                    '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Reason for Return</label>' +
                    '<textarea id="returnReason" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white/80 focus:border-red-400 focus:outline-none" rows="2" placeholder="Enter reason..."></textarea>' +
                '</div>' +
                
                '<div class="mb-4" id="refundMethodDiv">' +
                    '<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Refund Method</label>' +
                    '<select id="refundMethod" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white/80 focus:border-red-400 focus:outline-none">' +
                        '<option value="cash">Cash</option>' +
                        '<option value="card">Card</option>' +
                        '<option value="credit_note">Credit Note</option>' +
                    '</select>' +
                '</div>' +
                
                '<button onclick="processReturn(\'' + order.order_number + '\')" class="w-full gradient-rose text-white py-3 rounded-xl font-bold hover:opacity-90 transition text-lg shadow-lg flex items-center justify-center gap-2">' +
                    '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>' +
                    'Process' +
                '</button>' +
                '</div>';
        });
}

function toggleReturnType() {
    var type = document.getElementById('returnType').value;
    document.getElementById('refundAmountDiv').classList.toggle('hidden', type === 'replacement');
    document.getElementById('replacementDiv').classList.toggle('hidden', type !== 'replacement');
    document.getElementById('refundMethodDiv').classList.toggle('hidden', type === 'replacement');
}

document.addEventListener('keydown', function(e) {
    if (e.target.id === 'replacementProduct' && e.key === 'Enter') {
        e.preventDefault();
        var barcode = e.target.value.trim();
        fetch('/api/product/barcode/' + barcode)
            .then(r => r.json())
            .then(p => {
                if (p.id) {
                    document.getElementById('replacementProduct').value = p.name;
                    document.getElementById('replacementProductId').value = p.id;
                } else { alert('Product not found!'); }
            });
    }
});

function processReturn(orderNumber) {
    var type = document.getElementById('returnType').value;
    var reason = document.getElementById('returnReason').value;
    var amount = parseFloat(document.getElementById('refundAmount').value) || 0;
    var method = document.getElementById('refundMethod').value;
    
    if (!reason) { alert('Enter reason!'); return; }
    
    var data = { return_type: type, reason: reason, refund_amount: amount, refund_method: method };
    
    if (type === 'replacement') {
        data.replacement_product_id = document.getElementById('replacementProductId').value;
        data.replacement_quantity = parseInt(document.getElementById('replacementQty').value) || 1;
        data.refund_amount = 0;
    }
    
    fetch('/api/orders/' + orderNumber + '/return', {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
        if (result.success) {
            alert(result.message);
            document.getElementById('orderDetails').classList.add('hidden');
            document.getElementById('returnSearch').value = '';
            loadReturns();
            if (type === 'refund' && method === 'cash') fetch('/api/open-drawer');
        } else { alert('Error: ' + result.error); }
    });
}

function loadReturns() {
    fetch('/api/returns/all')
        .then(r => r.json())
        .then(data => {
            var tbody = document.getElementById('returnTable');
            if (!data.returns.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-slate-400">No returns yet</td></tr>';
                return;
            }
            tbody.innerHTML = data.returns.map(function(r) {
                return '<tr class="hover:bg-slate-50 transition">' +
                    '<td class="px-4 py-3 font-semibold text-red-600">' + r.return_number + '</td>' +
                    '<td class="px-4 py-3">' + r.order_number + '</td>' +
                    '<td class="px-4 py-3 text-sm font-medium">' + r.customer + '</td>' +
                    '<td class="px-4 py-3"><span class="px-2.5 py-1 rounded-full text-xs font-medium ' +
                        (r.type === 'refund' ? 'bg-red-100 text-red-800' : r.type === 'replacement' ? 'bg-blue-100 text-blue-800' : 'bg-amber-100 text-amber-800') + '">' + r.type + '</span></td>' +
                    '<td class="px-4 py-3 text-right font-bold ' + (r.refund_amount > 0 ? 'text-red-600' : '') + '">Rs.' + r.refund_amount.toFixed(2) + '</td>' +
                    '<td class="px-4 py-3 text-xs text-slate-500 hidden md:table-cell">' + (r.reason ? r.reason.substring(0, 35) : '') + '</td>' +
                    '<td class="px-4 py-3 text-xs text-slate-500 hidden md:table-cell">' + r.created_at + '</td>' +
                    '<td class="px-4 py-3 text-center"><span class="px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">' + r.status + '</span></td>' +
                '</tr>';
            }).join('');
        });
}

loadReturns();
setInterval(loadReturns, 10000);
</script>
{% endblock %}
