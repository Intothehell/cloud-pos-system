{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2><i class="fas fa-tachometer-alt"></i> Dashboard</h2>
    <hr>

    <div class="row mb-4">
        <div class="col-md-3 mb-3">
            <div class="card bg-primary text-white">
                <div class="card-body text-center">
                    <h3>{{ users_count }}</h3>
                    <small>Users</small>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-success text-white">
                <div class="card-body text-center">
                    <h3 id="todaySales">$0</h3>
                    <small>Today Sales</small>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-warning">
                <div class="card-body text-center">
                    <h3 id="creditDue">$0</h3>
                    <small>Credit Due</small>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-danger text-white">
                <div class="card-body text-center">
                    <h3 id="lowStock">0</h3>
                    <small>Low Stock</small>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12"><h4>Quick Actions</h4></div>
        <div class="col-md-3 mb-3">
            <a href="{{ url_for('pos.terminal') }}" class="text-decoration-none">
                <div class="card bg-info text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-cash-register fa-2x mb-2"></i>
                        <h6>POS Terminal</h6>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-3 mb-3">
            <a href="{{ url_for('inventory.manage') }}" class="text-decoration-none">
                <div class="card bg-success text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-boxes fa-2x mb-2"></i>
                        <h6>Inventory</h6>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-3 mb-3">
            <a href="{{ url_for('customer.list_customers') }}" class="text-decoration-none">
                <div class="card bg-primary text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-users fa-2x mb-2"></i>
                        <h6>Customers</h6>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-3 mb-3">
            <a href="{{ url_for('pos.bills') }}" class="text-decoration-none">
                <div class="card bg-dark text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-file-invoice fa-2x mb-2"></i>
                        <h6>Bill History</h6>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<script>
// Load stats
fetch('/api/dashboard/stats')
    .then(r => r.json())
    .then(stats => {
        document.getElementById('todaySales').textContent = '$' + stats.today_sales.toFixed(2);
        document.getElementById('creditDue').textContent = '$' + stats.total_credit.toFixed(2);
        document.getElementById('lowStock').textContent = stats.low_stock;
    });
</script>
{% endblock %}
